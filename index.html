<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
        user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Onu Geri Alacağım 💕</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0e27;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
    }

    /* The container Phaser mounts into */
    #gc {
      position: fixed;
      /* Cover the full screen including notch areas */
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0e27;
    }

    /* Phaser canvas — FIT mode handles sizing, we just make sure it never overflows */
    #gc canvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      /* Landscape: also respect notch on left/right */
      max-width: calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right));
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
</head>

<body>
  <div id="gc"></div>
  <script src="./core.js?v=1773570178"></script>
  <script src="./levels.js?v=1773570178"></script>
</body>

</html>
